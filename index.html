<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Websim Arcade</title>
  <style>
    :root{font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;color:#0b1220}
    body{margin:0;background:#f6f7f8;display:flex;align-items:center;justify-content:center;height:100vh}
    #app{width:980px;max-width:96vw;background:white;border-radius:10px;box-shadow:0 6px 24px rgba(8,15,30,0.08);overflow:hidden;display:flex;gap:16px;padding:18px}
    .panel{flex:1;min-width:0}
    h2{margin:4px 0 12px;font-size:18px}
    form{display:grid;gap:8px}
    input[type=text], textarea, select{width:100%;padding:10px;border:1px solid #e4e7eb;border-radius:8px;font-size:14px}
    button{background:#0b84ff;color:white;padding:10px 12px;border-radius:8px;border:0;cursor:pointer}
    .list{display:grid;gap:10px;max-height:68vh;overflow:auto;padding-right:6px}
    .card{display:flex;gap:10px;align-items:center;padding:10px;border-radius:8px;border:1px solid #eef2f6;background:#fff}
    .cover{width:120px;height:72px;border-radius:6px;background:#eef2f6;flex:0 0 120px;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .cover img, .cover video{width:100%;height:100%;object-fit:cover}
    .meta{flex:1;min-width:0}
    .meta h3{margin:0;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .meta p{margin:6px 0 0;color:#556; font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .row{display:flex;gap:8px;align-items:center}
    .small{font-size:12px;color:#7a8796}
    .controls{display:flex;gap:8px}
    .muted{color:#94a3b8;font-size:13px}
    .notice{padding:8px;background:#fff3cd;border-radius:8px;border:1px solid #ffeeba;color:#5a4520;font-size:13px}
    footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
    @media(max-width:880px){#app{flex-direction:column;padding:12px} .cover{width:92px;height:64px}}
  </style>
</head>
<body>
  <div id="app" role="application" aria-label="Websim Arcade">
    <div class="panel" style="max-width:420px">
      <h2>Your Arcade Listing</h2>
      <div class="notice" id="status">Connecting...</div>
      <form id="entryForm" autocomplete="off" style="margin-top:12px">
        <input id="title" type="text" placeholder="Project title" required />
        <input id="url" type="text" placeholder="Paste websim.com URL (required)" required />
        <textarea id="description" rows="3" placeholder="Short description (optional)"></textarea>
        <label class="small">Cover image or video (optional)</label>
        <input id="file" type="file" accept="image/*,video/*" />
        <div style="display:flex;gap:8px">
          <button id="addBtn" type="submit">Add / Update</button>
          <button id="clearBtn" type="button" style="background:#e6eefc;color:#0b84ff">Clear form</button>
        </div>
      </form>

      <footer>
        <div class="muted small">One row per user. Your projects are stored in your personal JSON.</div>
        <div class="small" id="userLabel"></div>
      </footer>
    </div>

    <div class="panel">
      <h2>Arcade Preview</h2>
      <div class="list" id="list"></div>
    </div>
  </div>

  <script type="module" >
    import { WebsimSocket } from 'https://esm.sh/websim-socket@1.0.0';

    // --- Setup
    const room = new WebsimSocket();
    const collectionType = 'arcade_v1'; // bump if schema changes

    const el = {
      status: document.getElementById('status'),
      form: document.getElementById('entryForm'),
      title: document.getElementById('title'),
      url: document.getElementById('url'),
      description: document.getElementById('description'),
      file: document.getElementById('file'),
      addBtn: document.getElementById('addBtn'),
      clearBtn: document.getElementById('clearBtn'),
      list: document.getElementById('list'),
      userLabel: document.getElementById('userLabel')
    };

    let currentUser = null;
    let myRecord = null; // the single row for this user
    let uploading = false;

    // --- Utilities
    function normalizeWebsimUrl(input) {
      try {
        const u = new URL(input.startsWith('http') ? input : 'https://' + input);
        // require websim.com as domain or subdomain?
        if (!u.hostname.endsWith('websim.com')) return null;
        // if already published format like slug--username.on.websim.com return as-is
        if (u.hostname.endsWith('.on.websim.com')) return u.href;
        // parse /@username/slug
        // path could be like /@username/slug or /@username/slug/...
        const path = u.pathname.replace(/\/+$/,'');
        const match = path.match(/^\/@([^\/]+)\/([^\/]+)(?:\/.*)?$/);
        if (match) {
          const username = match[1];
          const slug = match[2];
          return `https://${slug}--${username}.on.websim.com/`;
        }
        // sometimes short: /slug (but user insisted websim.com domain url and conversion rule only for /@USERNAME/SLUG)
        // If it's not the @ pattern, but still websim.com, return the origin (keep safe)
        return u.href;
      } catch (e) {
        return null;
      }
    }

    function renderList(items) {
      el.list.innerHTML = '';
      if (!items || items.length === 0) {
        el.list.innerHTML = '<div class="muted small">No projects yet</div>';
        return;
      }
      items.forEach((it, idx) => {
        const card = document.createElement('div');
        card.className = 'card';
        const cover = document.createElement('div');
        cover.className = 'cover';
        if (it.cover && it.cover.type && it.cover.url) {
          if (it.cover.type.startsWith('image')) {
            const img = document.createElement('img');
            img.src = it.cover.url;
            img.alt = it.title || 'cover';
            cover.appendChild(img);
          } else if (it.cover.type.startsWith('video')) {
            const v = document.createElement('video');
            v.src = it.cover.url;
            v.muted = true;
            v.loop = true;
            v.playsInline = true;
            v.autoplay = true;
            cover.appendChild(v);
          }
        } else {
          cover.textContent = 'No cover';
        }

        const meta = document.createElement('div');
        meta.className = 'meta';
        const h3 = document.createElement('h3');
        h3.textContent = it.title || 'Untitled';
        const p = document.createElement('p');
        p.textContent = it.description || (it.url || '');
        const row = document.createElement('div');
        row.className = 'row';
        const small = document.createElement('div');
        small.className = 'small';
        small.textContent = it.url || '';
        const controls = document.createElement('div');
        controls.className = 'controls';
        const open = document.createElement('button');
        open.textContent = 'Open';
        open.onclick = () => window.open(it.url,'_blank');
        open.style.background = '#e6f6ff';
        open.style.color = '#0077cc';
        open.style.border = '0';
        open.style.padding = '6px 8px';
        open.style.borderRadius = '6px';
        const edit = document.createElement('button');
        edit.textContent = 'Edit';
        edit.onclick = () => populateFormForEdit(idx);
        edit.style.background = '#fff7e6';
        edit.style.color = '#b26a00';
        edit.style.border = '0';
        edit.style.padding = '6px 8px';
        edit.style.borderRadius = '6px';
        const del = document.createElement('button');
        del.textContent = 'Delete';
        del.onclick = () => removeProject(idx);
        del.style.background = '#fff0f0';
        del.style.color = '#b32020';
        del.style.border = '0';
        del.style.padding = '6px 8px';
        del.style.borderRadius = '6px';
        controls.appendChild(open);
        controls.appendChild(edit);
        controls.appendChild(del);

        row.appendChild(small);
        meta.appendChild(h3);
        meta.appendChild(p);
        meta.appendChild(row);
        card.appendChild(cover);
        card.appendChild(meta);
        card.appendChild(controls);
        el.list.appendChild(card);
      });
    }

    // --- Persistence helpers
    async function ensureMyRecord() {
      if (!currentUser) return;
      // attempt to find existing record for this user's username
      const existing = room.collection(collectionType).filter({ username: currentUser.username }).getList();
      if (existing && existing.length > 0) {
        myRecord = existing[0];
        // ensure data field exists
        if (!myRecord.data) myRecord.data = { projects: [] };
      } else {
        // create new
        myRecord = await room.collection(collectionType).create({
          data: { projects: [] }
        });
      }
      // subscribe to updates for user's row (keep UI in sync if they edit elsewhere)
      room.collection(collectionType).filter({ username: currentUser.username }).subscribe((rows) => {
        if (!rows || rows.length === 0) return;
        myRecord = rows[0];
        if (!myRecord.data) myRecord.data = { projects: [] };
        el.userLabel.textContent = currentUser.username;
        el.status.textContent = 'Ready';
        renderList(myRecord.data.projects || []);
      });
    }

    async function saveMyRecord(data) {
      if (!myRecord) return;
      // update only the data column
      await room.collection(collectionType).update(myRecord.id, { data });
    }

    // --- File upload
    async function uploadFile(file) {
      if (!file) return null;
      try {
        uploading = true;
        el.status.textContent = 'Uploading file...';
        const url = await websim.upload(file);
        return { url, type: file.type, name: file.name };
      } finally {
        uploading = false;
        el.status.textContent = 'Ready';
      }
    }

    // --- Form actions
    function clearForm() {
      el.title.value = '';
      el.url.value = '';
      el.description.value = '';
      el.file.value = '';
      el.addBtn.textContent = 'Add / Update';
      el.addBtn.dataset.editIndex = '';
    }

    function populateFormForEdit(index) {
      if (!myRecord || !myRecord.data) return;
      const proj = myRecord.data.projects[index];
      if (!proj) return;
      el.title.value = proj.title || '';
      el.url.value = proj.url || '';
      el.description.value = proj.description || '';
      el.addBtn.textContent = 'Save';
      el.addBtn.dataset.editIndex = index;
      // note: file input can't be populated for security reasons
    }

    async function removeProject(index) {
      if (!myRecord || !myRecord.data) return;
      const confirmed = confirm('Delete this project from your arcade?');
      if (!confirmed) return;
      const arr = (myRecord.data.projects || []).slice();
      arr.splice(index,1);
      const newData = Object.assign({}, myRecord.data, { projects: arr });
      await saveMyRecord(newData);
    }

    el.clearBtn.addEventListener('click', clearForm);

    el.form.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      if (uploading) return alert('File is still uploading');
      const rawUrl = el.url.value.trim();
      const normalized = normalizeWebsimUrl(rawUrl);
      if (!normalized) return alert('Please enter a valid websim.com URL.');
      el.addBtn.disabled = true;
      el.addBtn.textContent = 'Saving...';
      let cover = null;
      const f = el.file.files[0];
      if (f) {
        try {
          cover = await uploadFile(f);
        } catch (err) {
          alert('Upload failed');
          el.addBtn.disabled = false;
          el.addBtn.textContent = 'Add / Update';
          return;
        }
      }
      const project = {
        title: el.title.value.trim() || '',
        url: normalized,
        description: el.description.value.trim() || '',
        cover
      };

      const editIndex = el.addBtn.dataset.editIndex;
      const projects = (myRecord.data && myRecord.data.projects) ? myRecord.data.projects.slice() : [];
      if (editIndex !== undefined && editIndex !== '' ) {
        projects[Number(editIndex)] = project;
      } else {
        projects.push(project);
      }
      const newData = Object.assign({}, myRecord.data || {}, { projects });
      try {
        await saveMyRecord(newData);
        clearForm();
      } catch (err) {
        alert('Save failed: ' + (err.message || err));
      } finally {
        el.addBtn.disabled = false;
        el.addBtn.textContent = 'Add / Update';
      }
    });

    // --- Boot
    (async function init(){
      try {
        currentUser = await window.websim.getCurrentUser();
        el.userLabel.textContent = currentUser.username;
        el.status.textContent = 'Initializing...';
        await ensureMyRecord();
        el.status.textContent = 'Ready';
        // subscribe to all arcade rows to show preview of my own projects only? The user requested a simple arcade view where users can edit their listings.
        // We'll show only the current user's projects in preview (they edit their own single row).
        // If desired to show global arcade, subscribe to room.collection(collectionType).subscribe(...) and render aggregated list.
      } catch (err) {
        console.error(err);
        el.status.textContent = 'Error initializing';
      }
    })();
  </script>

</body>
